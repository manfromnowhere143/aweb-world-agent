<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aweb Agent">
  <defs>
    <linearGradient id="gold" x1="240" y1="200" x2="800" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8EFD8"/>
      <stop offset="0.5" stop-color="#D9B46A"/>
      <stop offset="1" stop-color="#9A7A3E"/>
    </linearGradient>
    <radialGradient id="field" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#171309"/>
      <stop offset="1" stop-color="#0A0A0B"/>
    </radialGradient>
  </defs>

  <!-- non-white field (World requirement) -->

  <!-- family medallion: outer ring + thin inner ring -->
  <circle cx="512" cy="512" r="428" fill="url(#field)" stroke="url(#gold)" stroke-width="28"/>
  <circle cx="512" cy="512" r="388" stroke="#D9B46A" stroke-opacity="0.22" stroke-width="8"/>

  <!-- verification halo: the verified human crowning the agent -->
  <circle cx="512" cy="360" r="78" stroke="url(#gold)" stroke-width="20" opacity="0.85"/>

  <!-- monoline A — the Aweb agent -->
  <path d="M360 716 L512 360 L664 716" stroke="url(#gold)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- crossbar = 3-node hash-chained receipt -->
  <path d="M416 592 H608" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>

  <!-- nodes (family language): apex = agent, feet = execution, crossbar = receipt chain -->
  <g fill="url(#gold)">
    <circle cx="512" cy="360" r="32"/>
    <circle cx="360" cy="716" r="30"/>
    <circle cx="664" cy="716" r="30"/>
    <circle cx="416" cy="592" r="15"/>
    <circle cx="512" cy="592" r="20"/>
    <circle cx="608" cy="592" r="15"/>
  </g>

  <!-- subtle engraved accents -->
  <g stroke="#D9B46A" stroke-linecap="round">
    <path d="M362 802 H662" stroke-width="18" opacity="0.16"/>
    <path d="M512 250 V292" stroke-width="16" opacity="0.5"/>
  </g>

  <!-- warm highlight specks for life -->
  <g fill="#FFFFFF">
    <circle cx="498" cy="346" r="9" opacity="0.72"/>
    <circle cx="372" cy="704" r="6" opacity="0.5"/>
    <circle cx="600" cy="584" r="5" opacity="0.5"/>
  </g>
</svg>
